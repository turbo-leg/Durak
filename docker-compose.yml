version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "2567:2567"
    environment:
      - PORT=2567
      - REDIS_URI=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
